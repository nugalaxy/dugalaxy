# Flagship example template — synthetic, defensive SOC triage conversations.
# Generates varied, consistent EDR-alert triage dialogues for detection-engineering tests.
# All payloads are obviously synthetic and inert.

meta:
  name: security-incident-triage
  description: "SOC analyst/agent triage conversations for synthetic EDR alerts"
  version: "1.0"

scenario:
  variables:
    process_name:
      type: choice
      values: ["powershell.exe", "cmd.exe", "wscript.exe", "mshta.exe", "rundll32.exe"]
    parent_process:
      type: choice
      values: ["winword.exe", "excel.exe", "outlook.exe", "chrome.exe", "explorer.exe"]
    severity:
      type: weighted_choice
      values: { critical: 0.2, high: 0.5, medium: 0.3 }
    verdict:
      type: choice
      values: ["true_positive", "false_positive", "needs_investigation"]
    dept:
      type: choice
      values: ["finance", "hr", "engineering", "sales"]
    user_index:
      type: range
      min: 1
      max: 99
    timestamp:
      type: faker
      kind: datetime_recent
      days_back: 90
    command_flags:
      type: choice
      values:
        - "-exec bypass -W Hidden -enc <REDACTED>"
        - "-NoProfile -NonInteractive -Command <REDACTED>"
        - "-ExecutionPolicy Unrestricted -File <REDACTED>"
    username:
      type: computed
      value: "{{ scenario.dept }}_user{{ scenario.user_index }}"
    edr_payload:
      type: object
      value:
        event_type: "process_creation"
        process_name: "{{ scenario.process_name }}"
        command_line: "{{ scenario.process_name }} {{ scenario.command_flags }}"
        parent_process: "{{ scenario.parent_process }}"
        user: "{{ scenario.username }}"
        timestamp: "{{ scenario.timestamp }}"
        severity: "{{ scenario.severity }}"

output:
  type: conversation
  system_prompt: |
    You are a senior SOC analyst assistant triaging EDR alerts.
    Be technically precise and concise. Do NOT invent facts.
    Ground truth for this incident:
      process:   {{ scenario.process_name }}
      parent:    {{ scenario.parent_process }}
      user:      {{ scenario.username }}
      severity:  {{ scenario.severity }}
      timestamp: {{ scenario.timestamp }}
  turns:
    - role: user
      content:
        type: fixed
        value: |
          I'm reviewing an XDR alert on {{ scenario.username }}'s workstation.
          Here's the EDR payload:
          ```json
          {{ scenario.edr_payload | json(indent=2) }}
          ```
          The parent process looks suspicious. What's your read?
    - role: assistant
      content:
        type: generated
        instruction: |
          Analyze the alert. Comment on the {{ scenario.parent_process }} ->
          {{ scenario.process_name }} parent/child relationship and the command flags.
          Weigh the risk given severity={{ scenario.severity }}, and end with a
          recommended action consistent with verdict={{ scenario.verdict }}.
        max_tokens: 600
        validation:
          min_length: 80
          must_mention: ["{{ scenario.parent_process }}"]

generation:
  n: 100
  seed: 42
  max_retries: 3
  output_dir: "./output/security-triage"
  output_formats: [jsonl, yaml]
