name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored anywhere.
# Triggered when a GitHub Release is published (Releases → Draft a new release).
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check metadata renders
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the Trusted Publisher configured on PyPI.
    environment: pypi
    permissions:
      id-token: write   # required for OIDC; this is how PyPI verifies the upload
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
