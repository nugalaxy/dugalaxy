# ──────────────────────────────────────────────────────────────────────────────
# Dugalaxy flagship example — customer-support conversations.
#
# It generates endless varied, *consistent* support dialogues: a seeded engine
# invents the ground-truth ticket facts, serializes them into a valid JSON account
# record, and hands that to the agent as ground truth (in the system prompt). The
# customer speaks in natural language; the model writes only the agent's reply.
# Same seed → same facts, forever.
#
#   Try it:   dugalaxy gen customer-support --n 5 --seed 42
#
# Provider/model settings are NOT in this file — they live in dugalaxy.config.yaml
# or CLI flags (e.g. --provider, --model). By default this runs against local Ollama.
# ──────────────────────────────────────────────────────────────────────────────

meta:
  name: customer-support
  description: "Customer-support conversations grounded in synthetic ticket data"
  version: "1.0"

scenario:
  # Every variable is generated deterministically from the run seed, so the same
  # seed always reproduces the same facts — independent of every other sample.
  variables:
    product:
      type: choice                     # pick one value, uniformly at random
      values:
        - "Nimbus CLI"
        - "Nimbus Cloud"
        - "Nimbus Desktop"
        - "Nimbus Mobile"

    plan:
      type: choice
      values:
        - "free"
        - "pro"
        - "team"
        - "enterprise"

    issue:
      type: weighted_choice            # pick one, with weights (some issues are commoner)
      values:
        login: 0.35
        billing: 0.25
        crashes: 0.20
        performance: 0.10
        data export: 0.10

    ticket_number:
      type: range                      # integer, inclusive on both ends
      min: 1000
      max: 9999

    customer:
      type: faker                      # seeded realistic value (see docs for the kinds)
      kind: name

    email:
      type: faker
      kind: email

    opened_at:
      type: faker
      kind: datetime_recent            # an ISO timestamp within the last `days_back` days
      days_back: 30

    ticket_id:
      type: computed                   # build a string by interpolating other variables
      value: "TICKET-{{ scenario.ticket_number }}"

    account_record:
      type: object                     # a structured map — serialized to VALID JSON for you
      value:                           # (never paste values into a JSON string yourself)
        ticket_id: "{{ scenario.ticket_id }}"
        customer: "{{ scenario.customer }}"
        email: "{{ scenario.email }}"
        product: "{{ scenario.product }}"
        plan: "{{ scenario.plan }}"
        category: "{{ scenario.issue }}"
        opened_at: "{{ scenario.opened_at }}"

output:
  type: conversation
  # The agent's ground truth lives here — the account record it would see in the
  # support tool. The customer never sees or sends this; they just talk (below).
  system_prompt: |
    You are a friendly, concise support agent for {{ scenario.product }}.
    Use the customer's account record below as ground truth — do not contradict it,
    and do not invent details that aren't in it. Greet the customer by name, cite the
    ticket id, and help with their issue.
    Account record:
    ```json
    {{ scenario.account_record | json(indent=2) }}
    ```
  turns:
    - role: user
      content:
        type: fixed                    # the engine fills this; the model never writes it
        value: |
          Hi, I'm {{ scenario.customer }}. I'm on the {{ scenario.plan }} plan for
          {{ scenario.product }}, and I'm reaching out because I'm having trouble with
          {{ scenario.issue }}. Could you help me get this sorted? You can reach me at
          {{ scenario.email }}. Thanks!

    - role: agent                      # 'agent' (not 'assistant') — matches common seeders
      content:
        type: generated                # the MODEL writes this, grounded by the record above
        instruction: |
          Reply to {{ scenario.customer }}. Acknowledge ticket {{ scenario.ticket_id }} by
          name, show you understand they're having trouble with {{ scenario.issue }} on
          {{ scenario.product }} ({{ scenario.plan }} plan), and give a concrete next step or
          one clarifying question. Keep it warm and under 6 sentences.
        max_tokens: 600
        validation:                    # structural checks only — never semantic
          min_length: 80
          must_mention:
            - "{{ scenario.ticket_id }}"

generation:
  n: 100
  seed: 42
  max_retries: 3
  output_dir: "./output/customer-support"
  output_formats:
    - jsonl
    - yaml
