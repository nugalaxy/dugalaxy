# ──────────────────────────────────────────────────────────────────────────────
# Dugalaxy quickstart — the zero-setup demo.
#
# This template is FULLY DETERMINISTIC: every field is generated by the seeded
# engine, nothing is written by a model. So it needs no model, no API key, and no
# config — it runs instantly, fully offline, straight after `pip install`:
#
#   dugalaxy gen quickstart
#
# It produces clean synthetic user profiles. When you're ready for model-written
# prose (e.g. support replies), graduate to:  dugalaxy gen customer-support
# ──────────────────────────────────────────────────────────────────────────────

meta:
  name: quickstart
  description: "Zero-setup demo — deterministic synthetic user profiles (no model needed)"
  version: "1.0"

scenario:
  # Each variable is generated deterministically from the run seed, so the same
  # seed always reproduces the same profiles.
  variables:
    user_id:
      type: faker
      kind: uuid4                      # a stable unique id

    full_name:
      type: faker
      kind: name                       # seeded realistic value (kinds: docs/template-spec.md)

    email:
      type: faker
      kind: email

    plan:
      type: weighted_choice            # pick one, with weights (most users are on free)
      values:
        free: 0.6
        pro: 0.3
        enterprise: 0.1

    created_at:
      type: faker
      kind: datetime_recent            # an ISO timestamp within the last `days_back` days
      days_back: 365

output:
  type: document                       # one structured record per sample (no conversation)
  content:
    type: fixed                        # the engine fills this; no model is involved
    # A structured map is serialized to VALID JSON for you — quotes, unicode, and
    # special characters are escaped correctly. (Never hand-build a JSON string.)
    value:
      id: "{{ scenario.user_id }}"
      name: "{{ scenario.full_name }}"
      email: "{{ scenario.email }}"
      plan: "{{ scenario.plan }}"
      created_at: "{{ scenario.created_at }}"

generation:
  n: 10
  seed: 42
  output_dir: "./output/quickstart"
  output_formats:
    - jsonl
    - yaml
